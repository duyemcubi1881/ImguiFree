<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gekey Premium - Unlock Success</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050508;
            --card-bg: rgba(10, 10, 18, 0.6);
            --primary: #39ff14; /* Neon Green for Success */
            --primary-glow: rgba(57, 255, 20, 0.3);
            --accent: #00f0ff; /* Cyan accent */
            --accent-glow: rgba(0, 240, 255, 0.2);
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --border: rgba(57, 255, 20, 0.15);
            --border-active: rgba(57, 255, 20, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            user-select: none;
            -webkit-user-drag: none;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, var(--accent-glow) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, var(--primary-glow) 0%, transparent 45%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.007) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.007) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 50px 40px;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            text-align: center;
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .container::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            background: linear-gradient(135deg, var(--primary), transparent, var(--accent));
            border-radius: 29px;
            z-index: -1;
            opacity: 0.2;
        }

        /* Success Animated Checkmark */
        .success-checkmark {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px auto;
            position: relative;
            background: rgba(57, 255, 20, 0.05);
            border-radius: 50%;
            border: 2px solid var(--primary);
            box-shadow: 0 0 25px var(--primary-glow);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .checkmark-icon {
            font-size: 2.8rem;
            color: var(--primary);
            font-weight: bold;
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes pop {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 {
            color: #ffffff;
            font-size: 1.8rem;
            font-weight: 850;
            letter-spacing: 1px;
            margin-bottom: 15px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(57, 255, 20, 0.2);
        }

        p {
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #94a3b8;
            padding: 0 10px;
        }

        /* Premium Details Box */
        .details-box {
            background: rgba(255, 255, 255, 0.015);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            margin-bottom: 35px;
            text-align: left;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 0.88rem;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .detail-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .detail-label {
            color: var(--text-muted);
            font-weight: 500;
        }

        .detail-value {
            color: #ffffff;
            font-weight: 600;
        }

        .badge-success {
            background: rgba(57, 255, 20, 0.1);
            color: var(--primary);
            padding: 3px 10px;
            border-radius: 8px;
            font-size: 0.78rem;
            border: 1px solid rgba(57, 255, 20, 0.2);
        }

        .badge-accent {
            background: rgba(0, 240, 255, 0.1);
            color: var(--accent);
            padding: 3px 10px;
            border-radius: 8px;
            font-size: 0.78rem;
            border: 1px solid rgba(0, 240, 255, 0.2);
        }

        /* Download Button */
        .btn-download {
            background: linear-gradient(135deg, var(--primary), #00ff87);
            color: #000000;
            border: none;
            border-radius: 14px;
            padding: 16px 40px;
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 5px 20px rgba(57, 255, 20, 0.25);
            text-decoration: none;
            display: inline-block;
            width: 100%;
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(57, 255, 20, 0.5);
            filter: brightness(1.05);
        }

        .btn-download:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="success-checkmark">
            <div class="checkmark-icon">✓</div>
        </div>
        <h1>Xác nhận thành công!</h1>
        <p>Hệ thống đã phê duyệt IP của bạn. Menu ImGui DLL hiện đã sẵn sàng để kích hoạt trên thiết bị của bạn.</p>

        <div class="details-box">
            <div class="detail-item">
                <span class="detail-label">Trạng thái IP:</span>
                <span class="badge-success">Đã Kích Hoạt</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">Liên kết HWID:</span>
                <span class="badge-accent">Khóa máy đầu tiên</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">Thời hạn mở khóa:</span>
                <span class="detail-value" id="expire-time">Hết ngày hôm nay</span>
            </div>
        </div>

        <!-- Trỏ link tải DLL của bạn tại đây (có thể thay đổi URL download nếu cần) -->
        <a href="https://yourdomain.com/files/imgui-client.dll" class="btn-download" id="download-btn">TẢI MENU CLIENT DLL</a>
    </div>

    <script>
        // Lấy session ID từ URL nếu muốn tracking lượt tải
        const urlParams = new URLSearchParams(window.location.search);
        const session = urlParams.get('session');
        console.log("Kích hoạt session tải:", session);

        // Hiển thị hạn dùng trực quan (00:00 ngày tiếp theo)
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        tomorrow.setHours(0, 0, 0, 0);
        
        const formattedDate = tomorrow.toLocaleDateString('vi-VN', {
            day: '2-digit',
            month: '2-digit',
            year: 'numeric'
        }) + " - 00:00";
        
        document.getElementById('expire-time').innerText = formattedDate;

        document.getElementById('download-btn').addEventListener('click', () => {
            console.log("Đang bắt đầu tải xuống tệp DLL...");
        });
    </script>
</body>
</html>
